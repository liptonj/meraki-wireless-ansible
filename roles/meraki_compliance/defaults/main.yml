---
# Default variables for Meraki Compliance Role
# These define the structure for desired SSID configurations
# Override in group_vars/all.yml or group_vars/meraki_networks.yml

# Desired SSID configurations per network
# Structure:
# meraki_desired_ssids:
#   - network_name: "Network1"
#     network_id: "N_1234567890"
#     ssids:
#       - name: "Corporate"
#         enabled: true
#         authMode: "8021x"
#         encryptionMode: "wpa2-eap"
#         visible: true
#         broadcast: true
#         minBitrate: 11
#         bandSelection: "Dual band operation"
#       - name: "Guest"
#         enabled: true
#         authMode: "open"
#         encryptionMode: "wpa"
#         visible: true
#         broadcast: true
meraki_desired_ssids: []

# Compliance check settings
compliance_check_enabled: true
compliance_strict_mode: false  # If true, any deviation fails compliance
compliance_report_dir: "{{ playbook_dir | default('.') }}/../reports"

# Fields to check for compliance (subset of all SSID fields)
# Set to empty list [] to check all fields
compliance_check_fields:
  - name
  - enabled
  - authMode
  - encryptionMode
  - visible
  - broadcast
  - minBitrate
  - bandSelection

# Meraki API Configuration (inherited from group_vars or environment)
meraki_api_key: "{{ lookup('env', 'MERAKI_API_KEY') | default('', true) }}"
meraki_org_id: "{{ meraki_org_id | default(omit) }}"
meraki_network_id: "{{ meraki_network_id | default(omit) }}"
