---
# Override in group_vars/all.yml or group_vars/meraki_networks.yml

meraki_desired_ssids: []

compliance_check_enabled: true
compliance_strict_mode: false
compliance_report_dir: "{{ playbook_dir | default('.') }}/../reports"

compliance_check_fields:
  - name
  - enabled
  - authMode
  - encryptionMode
  - visible
  - broadcast
  - minBitrate
  - bandSelection

meraki_api_key: "{{ lookup('env', 'MERAKI_DASHBOARD_API_KEY') | default(vault_meraki_api_key | default(''), true) }}"

# Alerting configuration
compliance_alerting_enabled: true

compliance_github_alert_enabled: true
compliance_github_repo: ""
compliance_github_token: "{{ lookup('env', 'GITHUB_TOKEN') | default('', true) }}"

compliance_webex_alert_enabled: true
compliance_webex_webhook_url: "{{ lookup('env', 'WEBEX_WEBHOOK_URL') | default('', true) }}"

compliance_webex_bot_enabled: true
compliance_webex_bot_token: "{{ lookup('env', 'WEBEX_BOT_TOKEN') | default(vault_webex_bot_token | default(''), true) }}"
compliance_webex_alert_email: "{{ lookup('env', 'WEBEX_ALERT_EMAIL') | default(vault_webex_alert_email | default(''), true) }}"
compliance_webex_webhook_secret: "{{ lookup('env', 'WEBEX_WEBHOOK_SECRET') | default(vault_webex_webhook_secret | default(''), true) }}"

# Security baseline checks
security_baseline_enabled: true

security_baseline_rules:
  no_open_auth:
    enabled: true
    severity: "critical"
    description: "Enabled SSIDs must not use open authentication"
  minimum_encryption:
    enabled: true
    severity: "critical"
    minimum: "wpa2"
    description: "Enabled SSIDs must use WPA2 or higher encryption"
  guest_bandwidth_limits:
    enabled: true
    severity: "warning"
    guest_ssid_pattern: "(?i)guest"
    description: "Guest SSIDs must have bandwidth limits configured"
  disabled_ssid_broadcast:
    enabled: true
    severity: "warning"
    description: "Disabled SSIDs should not be broadcasting"
