---
- name: Initialize security baseline results
  ansible.builtin.set_fact:
    security_violations: []
  tags:
    - compliance
    - security

- name: Check for open authentication on enabled SSIDs
  ansible.builtin.set_fact:
    security_violations: >-
      {{ security_violations + [{
        'ssid_name': item.name | default('Unknown'),
        'ssid_number': item.number | default(0),
        'rule': 'no_open_auth',
        'severity': 'critical',
        'message': 'SSID "' + item.name | default('Unknown') + '" uses open authentication',
        'current_value': item.authMode | default('unknown'),
        'expected': 'psk, 8021x, or other authenticated mode'
      }] }}
  loop: "{{ current_ssids.meraki_response | default([]) }}"
  loop_control:
    label: "{{ item.name | default('SSID ' ~ (item.number | default('unknown') | string)) }}"
  when:
    - meraki_compliance_security_baseline_rules.no_open_auth.enabled | default(true)
    - item.enabled | default(false) | bool
    - item.authMode | default('') == 'open'
  tags:
    - compliance
    - security

- name: Check allowed WPA encryption mode on enabled authenticated SSIDs
  ansible.builtin.set_fact:
    security_violations: >-
      {{ security_violations + [{
        'ssid_name': item.name | default('Unknown'),
        'ssid_number': item.number | default(0),
        'rule': 'minimum_encryption',
        'severity': 'critical',
        'message': 'SSID "' + item.name | default('Unknown') + '" uses invalid wpaEncryptionMode (' + item.wpaEncryptionMode | default('missing') + ')',
        'current_value': item.wpaEncryptionMode | default('missing'),
        'expected': (
          meraki_compliance_security_baseline_rules.minimum_encryption.allowed_values
          | default(['WPA2 only', 'WPA3 Transition Mode'])
          | join(', ')
        )
      }] }}
  loop: "{{ current_ssids.meraki_response | default([]) }}"
  loop_control:
    label: "{{ item.name | default('SSID ' ~ (item.number | default('unknown') | string)) }}"
  when:
    - meraki_compliance_security_baseline_rules.minimum_encryption.enabled | default(true)
    - item.enabled | default(false) | bool
    - item.authMode | default('open') != 'open'
    - item.wpaEncryptionMode | default('') not in (
        meraki_compliance_security_baseline_rules.minimum_encryption.allowed_values
        | default(['WPA2 only', 'WPA3 Transition Mode'])
      )
  tags:
    - compliance
    - security

- name: Check guest SSIDs have bandwidth limits
  ansible.builtin.set_fact:
    security_violations: >-
      {{ security_violations + [{
        'ssid_name': item.name | default('Unknown'),
        'ssid_number': item.number | default(0),
        'rule': 'guest_bandwidth_limits',
        'severity': 'warning',
        'message': 'Guest SSID "' + item.name | default('Unknown') + '" is missing one or more bandwidth limits',
        'current_value': 'Upload: '
          + (item.perClientBandwidthLimitUp | default(0) | string)
          + ', Download: '
          + (item.perClientBandwidthLimitDown | default(0) | string),
        'expected': 'Both upload and download bandwidth limits must be > 0'
      }] }}
  loop: "{{ current_ssids.meraki_response | default([]) }}"
  loop_control:
    label: "{{ item.name | default('SSID ' ~ (item.number | default('unknown') | string)) }}"
  when:
    - meraki_compliance_security_baseline_rules.guest_bandwidth_limits.enabled | default(true)
    - item.enabled | default(false) | bool
    - >-
      (
        item.name | default('')
        | regex_search(
          meraki_compliance_security_baseline_rules.guest_bandwidth_limits.guest_ssid_pattern
          | default('(?i)guest')
        )
      ) is not none
    - >-
      (item.perClientBandwidthLimitUp | default(0) | int) == 0
      or (item.perClientBandwidthLimitDown | default(0) | int) == 0
  tags:
    - compliance
    - security

- name: Display security baseline results
  ansible.builtin.debug:
    msg: |
      Security Baseline Check: {{ 'PASS' if (security_violations | length == 0) else 'FAIL' }}
      Critical violations: {{ security_violations | selectattr('severity', 'equalto', 'critical') | list | length }}
      Warning violations: {{ security_violations | selectattr('severity', 'equalto', 'warning') | list | length }}

      {% for violation in security_violations %}
      [{{ violation.severity | upper }}] {{ violation.message }}
        Current: {{ violation.current_value }}
        Expected: {{ violation.expected }}
      {% endfor %}
  tags:
    - compliance
    - security

- name: Merge security violations into network compliance
  ansible.builtin.set_fact:
    network_compliance: >-
      {{
        network_compliance | combine({
          'security_violations': security_violations,
          'security_critical_count': security_violations | selectattr('severity', 'equalto', 'critical') | list | length,
          'security_warning_count': security_violations | selectattr('severity', 'equalto', 'warning') | list | length,
          'security_passed': (security_violations | length == 0),
          'non_compliant_ssid_names': (
            (
              network_compliance.non_compliant_ssid_names | default([])
            )
            +
            (
              security_violations
              | selectattr('severity', 'equalto', 'critical')
              | map(attribute='ssid_name')
              | list
            )
            | unique
          ),
          'ssid_non_compliant_count': (
            (
              (
                network_compliance.non_compliant_ssid_names | default([])
              )
              +
              (
                security_violations
                | selectattr('severity', 'equalto', 'critical')
                | map(attribute='ssid_name')
                | list
              )
            )
            | unique
            | length
          ),
          'compliant': network_compliance.compliant and (
            security_violations | selectattr('severity', 'equalto', 'critical') | list | length == 0
          )
        })
      }}
  tags:
    - compliance
    - security
