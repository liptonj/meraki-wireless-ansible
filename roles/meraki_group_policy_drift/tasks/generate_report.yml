---
# Generate drift detection report
# Creates a markdown report of drift findings

- name: Ensure report directory exists
  ansible.builtin.file:
    path: "{{ report_output_path | dirname }}"
    state: directory
    mode: '0755'
  delegate_to: localhost
  when: report_output_path is defined

- name: Generate drift report from template
  ansible.builtin.template:
    src: drift_report.md.j2
    dest: "{{ report_output_path }}"
    mode: '0644'
  delegate_to: localhost
  when: report_output_path is defined

- name: Report file location
  ansible.builtin.debug:
    msg: "Drift report generated: {{ report_output_path }}"
  when: report_output_path is defined
