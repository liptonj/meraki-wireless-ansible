---
# Main task file for meraki_group_policy_drift role
# 
# This role orchestrates group policy drift detection and remediation:
# 1. Gather current group policies from Meraki API
# 2. Compare against desired state (source of truth)
# 3. Report findings
# 4. Conditionally remediate drift

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - meraki_network_id is defined
      - vault_meraki_api_key is defined or meraki_api_key is defined
      - meraki_group_policies is defined
    fail_msg: |
      Required variables missing:
      - meraki_network_id: Network ID to check
      - vault_meraki_api_key or meraki_api_key: API authentication
      - meraki_group_policies: Desired group policy configuration
    quiet: true

- name: Set API key variable
  ansible.builtin.set_fact:
    _api_key: "{{ vault_meraki_api_key | default(meraki_api_key) }}"
  no_log: true

- name: Initialize drift results
  ansible.builtin.set_fact:
    drift_results:
      total_policies: "{{ meraki_group_policies | length }}"
      compliant_policies: 0
      drift_detected: 0
      policies: []
      timestamp: "{{ ansible_date_time.iso8601 }}"
      check_mode: "{{ ansible_check_mode }}"

- name: Gather current group policies from Meraki Dashboard
  ansible.builtin.include_tasks: gather_current.yml

- name: Compare desired state with current state
  ansible.builtin.include_tasks: compare_state.yml

- name: Report drift findings
  ansible.builtin.debug:
    msg: |
      ========================================
      Group Policy Drift Detection Results
      ========================================
      Total Policies Checked: {{ drift_results.total_policies }}
      Policies In Compliance: {{ drift_results.compliant_policies }}
      Policies With Drift: {{ drift_results.drift_detected }}
      
      {% if ansible_check_mode %}
      Mode: CHECK MODE (report only, no remediation)
      {% else %}
      Mode: REMEDIATION MODE (will auto-correct drift)
      {% endif %}

- name: Generate drift report
  ansible.builtin.include_tasks: generate_report.yml
  when: drift_report_enabled | default(true)

- name: Apply remediation (unless in check mode)
  ansible.builtin.include_tasks: remediate.yml
  when:
    - drift_results.drift_detected | int > 0
    - not ansible_check_mode
    - drift_auto_remediate | default(true)
