---
# Apply group policy corrections to remediate drift
# This task only runs when drift is detected and not in check mode

- name: Begin remediation process
  ansible.builtin.debug:
    msg: |
      Starting remediation for {{ drift_results.drift_detected }} policy/policies with drift
      This will update configurations to match the source of truth

- name: Get list of policies needing remediation
  ansible.builtin.set_fact:
    _policies_to_remediate: "{{ drift_results.policies | selectattr('drift_detected', 'equalto', true) | map(attribute='name') | list }}"

- name: Apply group policy corrections
  cisco.meraki.networks_group_policies:
    meraki_api_key: "{{ _api_key }}"
    networkId: "{{ meraki_network_id }}"
    name: "{{ item.name }}"
    bandwidth: "{{ item.bandwidth | default(omit) }}"
    firewallAndTrafficShaping: "{{ item.firewallAndTrafficShaping | default(omit) }}"
    vlanTagging: "{{ item.vlanTagging | default(omit) }}"
    splashAuthSettings: "{{ item.splashAuthSettings | default('bypass') }}"
    bonjourForwarding: "{{ item.bonjourForwarding | default(omit) }}"
    state: present
  loop: "{{ meraki_group_policies }}"
  loop_control:
    label: "{{ item.name }}"
  when: 
    - item.name in _policies_to_remediate
  register: remediation_results
  retries: "{{ drift_api_retries }}"
  delay: "{{ drift_api_retry_delay }}"
  until: remediation_results is succeeded
  no_log: true  # Protect API key from logs
  changed_when: true  # Always report as changed when remediating

- name: Track remediation success
  ansible.builtin.set_fact:
    _remediation_success_count: "{{ remediation_results.results | selectattr('changed', 'equalto', true) | list | length }}"
    _remediation_failed_count: "{{ remediation_results.results | selectattr('failed', 'equalto', true) | default([]) | list | length }}"

- name: Log remediation results
  ansible.builtin.debug:
    msg: |
      Remediation Complete:
      - Successfully remediated: {{ _remediation_success_count }} policy/policies
      {% if _remediation_failed_count | int > 0 %}
      - Failed to remediate: {{ _remediation_failed_count }} policy/policies
      {% endif %}
      
      Policies updated:
      {% for result in remediation_results.results %}
      {% if result.changed | default(false) %}
      - {{ result.item.name }}: CORRECTED
      {% endif %}
      {% endfor %}

- name: Update drift results with remediation status
  ansible.builtin.set_fact:
    drift_results: "{{ drift_results | combine({
      'remediation_attempted': true,
      'remediation_success': _remediation_success_count | int,
      'remediation_failed': _remediation_failed_count | int
    }) }}"

- name: Fail if remediation had errors
  ansible.builtin.fail:
    msg: |
      Remediation completed with errors!
      Successfully remediated: {{ _remediation_success_count }}
      Failed: {{ _remediation_failed_count }}
      
      Review the errors above and retry.
  when: _remediation_failed_count | int > 0
