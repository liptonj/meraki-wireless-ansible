---
# Default variables for meraki_group_policy_drift role
# These can be overridden in playbooks or group_vars

# Report output settings
drift_report_enabled: true
drift_report_format: "markdown"  # Options: markdown, json

# Drift detection sensitivity
# Set which fields to compare for drift detection
drift_check_bandwidth: true
drift_check_vlan: true
drift_check_firewall: true
drift_check_bonjour: true
drift_check_splash: true

# Remediation settings
drift_auto_remediate: true  # Can be overridden by ansible_check_mode

# API retry settings (inherit from global if not specified)
drift_api_retries: "{{ meraki_api_retries | default(3) }}"
drift_api_retry_delay: "{{ meraki_api_retry_delay | default(5) }}"

# Logging settings
drift_log_enabled: true
drift_log_level: "info"  # Options: debug, info, warning, error

# Initialize drift results structure
drift_results:
  total_policies: 0
  compliant_policies: 0
  drift_detected: 0
  policies: []
