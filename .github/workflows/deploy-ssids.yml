name: Deploy SSIDs

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
      dry_run:
        description: 'Dry run (check mode — no changes pushed to Meraki)'
        required: true
        default: true
        type: boolean

      # ── New SSID configuration ─────────────────────────────────────────────
      # Leave ssid_name blank to deploy the existing group_vars config unchanged.
      ssid_name:
        description: 'SSID name to add / update (leave blank to skip)'
        required: false
        default: ''

      auth_mode:
        description: 'Security type'
        required: false
        default: 'psk'
        type: choice
        options:
          - psk
          - 8021x-radius
          - open

      encryption_mode:
        description: 'Encryption standard'
        required: false
        default: 'wpa3'
        type: choice
        options:
          - wpa3
          - wpa2
          - wpa

      psk_secret:
        description: 'PSK to use — pick a saved secret (PSK auth only)'
        required: false
        default: 'none'
        type: choice
        options:
          - none
          - CORP_SECURE_PSK
          - GUEST_SSID_PSK
          - CORPORATE_BYOD_PSK
          - IOT_SSID_PSK

      band_selection:
        description: 'Band selection'
        required: false
        default: 'Dual band operation'
        type: choice
        options:
          - 'Dual band operation'
          - '5 GHz band only'
          - '2.4 GHz band only'

      ssid_enabled:
        description: 'Enable SSID on deploy'
        required: false
        default: true
        type: boolean

      ssid_visible:
        description: 'Broadcast SSID (visible to clients)'
        required: false
        default: true
        type: boolean

      # ── Network targeting ──────────────────────────────────────────────────
      target_networks:
        description: >-
          Network names to deploy to — comma-separated (e.g. "Site-A,Site-C").
          Leave blank to use the default MERAKI_NETWORK_NAMES variable.
        required: false
        default: ''

      scope_ssid:
        description: >-
          Existing SSID name to deploy to target_networks (e.g. "Corp-Secure").
          Leave blank to deploy ALL SSIDs in meraki_orgs.yml to the target networks.
        required: false
        default: ''
  repository_dispatch:
    types: [deploy-ssids]

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  INPUT_ENVIRONMENT: ${{ github.event.inputs.environment || github.event.client_payload.environment || 'production' }}
  INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || (github.event.client_payload.dry_run != null && format('{0}', github.event.client_payload.dry_run)) || 'true' }}
  INPUT_SSID_NAME: ${{ github.event.inputs.ssid_name || github.event.client_payload.ssid_name || '' }}
  INPUT_AUTH_MODE: ${{ github.event.inputs.auth_mode || github.event.client_payload.auth_mode || 'psk' }}
  INPUT_ENCRYPTION_MODE: ${{ github.event.inputs.encryption_mode || github.event.client_payload.encryption_mode || 'wpa3' }}
  INPUT_PSK_SECRET: ${{ github.event.inputs.psk_secret || github.event.client_payload.psk_secret || 'none' }}
  INPUT_BAND_SELECTION: ${{ github.event.inputs.band_selection || github.event.client_payload.band_selection || 'Dual band operation' }}
  INPUT_SSID_ENABLED: ${{ github.event.inputs.ssid_enabled || (github.event.client_payload.ssid_enabled != null && format('{0}', github.event.client_payload.ssid_enabled)) || 'true' }}
  INPUT_SSID_VISIBLE: ${{ github.event.inputs.ssid_visible || (github.event.client_payload.ssid_visible != null && format('{0}', github.event.client_payload.ssid_visible)) || 'true' }}
  INPUT_TARGET_NETWORKS: ${{ github.event.inputs.target_networks || github.event.client_payload.target_networks || '' }}
  INPUT_SCOPE_SSID: ${{ github.event.inputs.scope_ssid || github.event.client_payload.scope_ssid || '' }}

# Prevent concurrent deploys to the same environment
concurrency:
  group: deploy-ssids-${{ github.event.inputs.environment || github.event.client_payload.environment || 'production' }}
  cancel-in-progress: false

jobs:

  # ── Job 1: write SSID config into group_vars and commit ───────────────────
  configure-ssid:
    name: Update group_vars with new SSID config
    runs-on: ubuntu-latest
    if: >-
      (github.event.inputs.ssid_name || github.event.client_payload.ssid_name || '') != ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install ruamel.yaml
        run: pip install "ruamel.yaml>=0.18"

      - name: Validate inputs
        run: |
          AUTH="${{ env.INPUT_AUTH_MODE }}"
          PSK="${{ env.INPUT_PSK_SECRET }}"
          if [ "$AUTH" = "psk" ] && [ "$PSK" = "none" ]; then
            echo "::error::auth_mode is 'psk' but no psk_secret was selected. Pick a saved PSK."
            exit 1
          fi

      - name: Update group_vars/meraki_orgs.yml
        env:
          SSID_NAME:       ${{ env.INPUT_SSID_NAME }}
          AUTH_MODE:       ${{ env.INPUT_AUTH_MODE }}
          ENCRYPTION_MODE: ${{ env.INPUT_ENCRYPTION_MODE }}
          PSK_SECRET:      ${{ env.INPUT_PSK_SECRET }}
          BAND_SELECTION:  ${{ env.INPUT_BAND_SELECTION }}
          SSID_ENABLED:    ${{ env.INPUT_SSID_ENABLED }}
          SSID_VISIBLE:    ${{ env.INPUT_SSID_VISIBLE }}
        run: python scripts/update_ssid_config.py

      - name: Commit updated group_vars
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add group_vars/meraki_orgs.yml
          if git diff --cached --quiet; then
            echo "group_vars/meraki_orgs.yml unchanged — nothing to commit."
          else
            git commit -m "feat(ssids): add/update SSID '${{ env.INPUT_SSID_NAME }}' [run #${{ github.run_number }}] [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push
          fi

      - name: Write job summary
        if: always()
        run: |
          echo "## SSID Config Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| SSID Name | \`${{ env.INPUT_SSID_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Auth Mode | \`${{ env.INPUT_AUTH_MODE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Encryption | \`${{ env.INPUT_ENCRYPTION_MODE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| PSK Secret | \`${{ env.INPUT_PSK_SECRET }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Band | \`${{ env.INPUT_BAND_SELECTION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Enabled | \`${{ env.INPUT_SSID_ENABLED }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Visible | \`${{ env.INPUT_SSID_VISIBLE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Target Networks | \`${{ env.INPUT_TARGET_NETWORKS || '(default)' }}\` |" >> $GITHUB_STEP_SUMMARY

  # ── Job 2: update meraki_networks.yml with network desired state ───────────
  configure-network:
    name: Add Networks to Compliance Desired State
    runs-on: ubuntu-latest
    needs: [configure-ssid]
    # Only run when target_networks is specified
    if: >-
      always()
      && (github.event.inputs.target_networks || github.event.client_payload.target_networks || '') != ''
      && (needs.configure-ssid.result == 'success' || needs.configure-ssid.result == 'skipped')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Pick up any changes committed by configure-ssid
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache Ansible Galaxy collections
        uses: actions/cache@v5
        with:
          path: ~/.ansible/collections
          key: ${{ runner.os }}-ansible-galaxy-${{ hashFiles('requirements.yml') }}
          restore-keys: |
            ${{ runner.os }}-ansible-galaxy-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          ansible-galaxy collection install -r requirements.yml

      - name: Update meraki_networks.yml for target networks
        run: |
          EXTRA_ARGS=(
            -e "target_networks=${{ env.INPUT_TARGET_NETWORKS }}"
          )

          EFFECTIVE_SCOPE_SSID="${{ env.INPUT_SCOPE_SSID }}"
          if [ "$EFFECTIVE_SCOPE_SSID" = "true" ] || [ "$EFFECTIVE_SCOPE_SSID" = "false" ]; then
            EFFECTIVE_SCOPE_SSID=""
          fi

          if [ -z "$EFFECTIVE_SCOPE_SSID" ] && [ -n "${{ env.INPUT_SSID_NAME }}" ]; then
            EFFECTIVE_SCOPE_SSID="${{ env.INPUT_SSID_NAME }}"
          fi

          if [ -n "$EFFECTIVE_SCOPE_SSID" ]; then
            EXTRA_ARGS+=(-e "scope_ssid=${EFFECTIVE_SCOPE_SSID}")
          fi

          ansible-playbook playbooks/configure_network.yml \
            -i inventory/production.yml \
            "${EXTRA_ARGS[@]}"

      - name: Commit updated meraki_networks.yml
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add group_vars/meraki_networks.yml
          if git diff --cached --quiet; then
            echo "meraki_networks.yml unchanged — nothing to commit."
          else
            git commit -m "feat(networks): add '${{ env.INPUT_TARGET_NETWORKS }}' to desired state [run #${{ github.run_number }}] [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push
          fi

      - name: Write job summary
        if: always()
        run: |
          echo "## Network Desired State Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Target Networks | \`${{ env.INPUT_TARGET_NETWORKS }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Scope SSID | \`${{ env.INPUT_SCOPE_SSID || '(all SSIDs)' }}\` |" >> $GITHUB_STEP_SUMMARY

  # ── Job 3: run the Ansible deploy ─────────────────────────────────────────
  deploy:
    name: Deploy SSIDs to Meraki
    runs-on: ubuntu-latest
    needs: [configure-ssid, configure-network]
    # Run when both configure jobs are either done or were skipped
    if: >-
      always()
      && (needs.configure-ssid.result == 'success' || needs.configure-ssid.result == 'skipped')
      && (needs.configure-network.result == 'success' || needs.configure-network.result == 'skipped')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Pull the latest commit so we get any group_vars update from configure-ssid
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache Ansible Galaxy collections
        uses: actions/cache@v5
        with:
          path: ~/.ansible/collections
          key: ${{ runner.os }}-ansible-galaxy-${{ hashFiles('requirements.yml') }}
          restore-keys: |
            ${{ runner.os }}-ansible-galaxy-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          ansible-galaxy collection install -r requirements.yml

      - name: Write Ansible Vault password file
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass
        # File is deleted in the always() cleanup step below

      - name: Deploy SSIDs
        env:
          MERAKI_DASHBOARD_API_KEY:         ${{ secrets.MERAKI_DASHBOARD_API_KEY }}
          MERAKI_ORG_NAME:                  ${{ vars.MERAKI_ORG_NAME }}
          # target_networks overrides the default network list when specified
          MERAKI_NETWORK_NAMES: >-
            ${{ env.INPUT_TARGET_NETWORKS != ''
                && env.INPUT_TARGET_NETWORKS
                || vars.MERAKI_NETWORK_NAMES }}
          CORP_SECURE_PSK:                  ${{ secrets.CORP_SECURE_PSK }}
          GUEST_SSID_PSK:                   ${{ secrets.GUEST_SSID_PSK }}
          CORPORATE_BYOD_PSK:               ${{ secrets.CORPORATE_BYOD_PSK }}
          IOT_SSID_PSK:                     ${{ secrets.IOT_SSID_PSK }}
          RADIUS_SERVER_1_HOST:             ${{ secrets.RADIUS_SERVER_1_HOST }}
          RADIUS_SERVER_1_SECRET:           ${{ secrets.RADIUS_SERVER_1_SECRET }}
          RADIUS_ACCOUNTING_SERVER_HOST:    ${{ secrets.RADIUS_ACCOUNTING_SERVER_HOST }}
          RADIUS_ACCOUNTING_SERVER_SECRET:  ${{ secrets.RADIUS_ACCOUNTING_SERVER_SECRET }}
        run: |
          EXTRA_ARGS="--vault-password-file .vault_pass"
          if [ "${{ env.INPUT_DRY_RUN }}" = "true" ]; then
            echo "Running in CHECK MODE (dry run — no Meraki changes)"
            EXTRA_ARGS="$EXTRA_ARGS --check --diff"
          else
            echo "Running in LIVE MODE — SSIDs will be configured on Meraki"
          fi

          ansible-playbook playbooks/ssid_management.yml \
            -i inventory/production.yml \
            $EXTRA_ARGS

      - name: Remove vault password file
        if: always()
        run: rm -f .vault_pass

  # ── Job 4: post-deploy compliance check ───────────────────────────────────
  compliance:
    name: Post-Deploy Compliance Check
    runs-on: ubuntu-latest
    needs: [deploy]
    if: >-
      (github.event.inputs.dry_run || (github.event.client_payload.dry_run != null
      && format('{0}', github.event.client_payload.dry_run)) || 'true') != 'true'
      && needs.deploy.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          ansible-galaxy collection install -r requirements.yml

      - name: Write Ansible Vault password file
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > .vault_pass

      - name: Run compliance check
        env:
          MERAKI_DASHBOARD_API_KEY:         ${{ secrets.MERAKI_DASHBOARD_API_KEY }}
          MERAKI_ORG_NAME:                  ${{ vars.MERAKI_ORG_NAME }}
          MERAKI_NETWORK_NAMES: >-
            ${{ env.INPUT_TARGET_NETWORKS != ''
                && env.INPUT_TARGET_NETWORKS
                || vars.MERAKI_NETWORK_NAMES }}
          CORP_SECURE_PSK:                  ${{ secrets.CORP_SECURE_PSK }}
          GUEST_SSID_PSK:                   ${{ secrets.GUEST_SSID_PSK }}
          CORPORATE_BYOD_PSK:               ${{ secrets.CORPORATE_BYOD_PSK }}
          IOT_SSID_PSK:                     ${{ secrets.IOT_SSID_PSK }}
          RADIUS_SERVER_1_HOST:             ${{ secrets.RADIUS_SERVER_1_HOST }}
          RADIUS_SERVER_1_SECRET:           ${{ secrets.RADIUS_SERVER_1_SECRET }}
          RADIUS_ACCOUNTING_SERVER_HOST:    ${{ secrets.RADIUS_ACCOUNTING_SERVER_HOST }}
          RADIUS_ACCOUNTING_SERVER_SECRET:  ${{ secrets.RADIUS_ACCOUNTING_SERVER_SECRET }}
          GITHUB_TOKEN:                     ${{ secrets.GITHUB_TOKEN }}
          WEBEX_BOT_TOKEN:                  ${{ secrets.WEBEX_BOT_TOKEN }}
          WEBEX_ALERT_EMAIL:                ${{ secrets.WEBEX_ALERT_EMAIL }}
        run: |
          ansible-playbook playbooks/compliance_check.yml \
            -i inventory/production.yml \
            --vault-password-file .vault_pass \
            -e "compliance_github_repo=${{ github.repository }}" \
            -e "compliance_github_token=${GITHUB_TOKEN}"

      - name: Snapshot post-deploy config to baselines
        if: always()
        env:
          MERAKI_DASHBOARD_API_KEY: ${{ secrets.MERAKI_DASHBOARD_API_KEY }}
          MERAKI_ORG_NAME:          ${{ vars.MERAKI_ORG_NAME }}
          MERAKI_NETWORK_NAMES: >-
            ${{ env.INPUT_TARGET_NETWORKS != ''
                && env.INPUT_TARGET_NETWORKS
                || vars.MERAKI_NETWORK_NAMES }}
        run: |
          ansible-playbook playbooks/config_snapshot.yml \
            -i inventory/production.yml \
            --vault-password-file .vault_pass

      - name: Commit updated baseline after deploy
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add baselines/
          if git diff --cached --quiet; then
            echo "No baseline changes after deploy."
          else
            git commit -m "chore(baselines): post-deploy snapshot [run #${{ github.run_number }}] [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push
          fi

      - name: Remove vault password file
        if: always()
        run: rm -f .vault_pass
