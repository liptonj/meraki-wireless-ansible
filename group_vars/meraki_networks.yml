---
# Compliance Desired State — used by compliance_check.yml.
# Any deviation from these values is flagged as drift.
#
# network_name must match the Meraki network name exactly.
# Networks not listed here will have no desired config to compare against.
# Last updated: 2026-03-17T01:39:04Z via configure_network.yml
meraki_desired_ssids:
  - network_name: Site-A
    ssids:
    - authMode: psk
      bandSelection: Dual band operation
      broadcast: true
      enabled: true
      encryptionMode: wpa2
      minBitrate: 11
      name: Corp-Secure
      visible: true
  - network_name: Site-B
    ssids:
    - authMode: psk
      bandSelection: Dual band operation
      broadcast: true
      enabled: true
      encryptionMode: wpa2
      minBitrate: 11
      name: Corp-Secure
      visible: true
  - network_name: LAB-Site1
    ssids:
    - authMode: psk
      bandSelection: Dual band operation
      broadcast: true
      enabled: true
      encryptionMode: wpa3
      minBitrate: 11
      name: test
      visible: true
    - authMode: open
      bandSelection: Dual band operation
      broadcast: true
      enabled: false
      encryptionMode: open
      minBitrate: 11
      name: Corp-Guest
      visible: true
