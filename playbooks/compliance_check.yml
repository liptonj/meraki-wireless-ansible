---
# Meraki Wireless Compliance Check Playbook
# Detects configuration drift and generates compliance reports
#
# Usage:
#   ansible-playbook playbooks/compliance_check.yml -i inventory/production.yml
#   ansible-playbook playbooks/compliance_check.yml --check --diff

- name: Discover networks
  ansible.builtin.import_playbook: discover.yml

- name: Run Compliance Checks on Each Network
  hosts: meraki_networks
  gather_facts: true

  vars:
    compliance_report_dir: "{{ playbook_dir }}/../reports"
    compliance_report_filename: "compliance_report_{{ ansible_date_time.epoch }}.md"

  pre_tasks:
    - name: Ensure reports directory exists
      ansible.builtin.file:
        path: "{{ compliance_report_dir }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true
      tags: always

  roles:
    - role: meraki_compliance
      vars:
        desired_ssid_configs: "{{ meraki_desired_ssids | default([]) }}"

  post_tasks:
    - name: Collect per-network compliance details
      ansible.builtin.set_fact:
        compliance_network_details: >-
          {{
            groups['meraki_networks'] | default([])
            | map('extract', hostvars)
            | selectattr('network_compliance', 'defined')
            | map(attribute='network_compliance')
            | list
          }}
      run_once: true
      tags: always

    - name: Aggregate compliance results across all discovered networks
      ansible.builtin.set_fact:
        compliance_results:
          networks_checked: "{{ compliance_network_details | length }}"
          networks_compliant: "{{ compliance_network_details | selectattr('compliant', 'equalto', true) | list | length }}"
          networks_non_compliant: "{{ compliance_network_details | selectattr('compliant', 'equalto', false) | list | length }}"
          ssids_checked: "{{ compliance_network_details | map(attribute='ssids') | flatten | list | length }}"
          ssids_compliant: "{{ compliance_network_details | map(attribute='ssids') | flatten | selectattr('compliant', 'equalto', true) | list | length }}"
          ssids_non_compliant: "{{ compliance_network_details | map(attribute='ssid_non_compliant_count') | map('int') | sum }}"
          security_critical_count: "{{ compliance_network_details | map(attribute='security_critical_count') | map('int') | sum }}"
          security_warning_count: "{{ compliance_network_details | map(attribute='security_warning_count') | map('int') | sum }}"
          security_passed: "{{ (compliance_network_details | map(attribute='security_critical_count') | map('int') | sum) == 0 }}"
          network_details: "{{ compliance_network_details }}"
          timestamp: "{{ ansible_date_time.iso8601 }}"
          playbook_mode: "{{ 'CHECK MODE (DRY-RUN)' if ansible_check_mode else 'LIVE MODE' }}"
      run_once: true
      tags: always

    - name: Generate compliance report
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/meraki_compliance/templates/compliance_report.md.j2"
        dest: "{{ compliance_report_dir }}/{{ compliance_report_filename }}"
        mode: '0644'
      vars:
        compliance_data: "{{ compliance_results }}"
      delegate_to: localhost
      run_once: true
      tags:
        - compliance
        - reporting

    - name: Display compliance summary
      ansible.builtin.debug:
        msg: |
          Compliance check completed!

          Total Networks Checked: {{ compliance_results.networks_checked | default(0) }}
          Networks Compliant: {{ compliance_results.networks_compliant | default(0) }}
          Networks Non-Compliant: {{ compliance_results.networks_non_compliant | default(0) }}
          Total SSIDs Checked: {{ compliance_results.ssids_checked | default(0) }}
          SSIDs Compliant: {{ compliance_results.ssids_compliant | default(0) }}
          SSIDs Non-Compliant: {{ compliance_results.ssids_non_compliant | default(0) }}

          Report saved to: {{ compliance_report_dir }}/{{ compliance_report_filename }}
      when: compliance_results is defined
      run_once: true
      tags: always

    - name: Set compliance failure flag
      ansible.builtin.set_fact:
        compliance_failed: "{{ (compliance_results.networks_non_compliant | default(0) | int) > 0 }}"
      when: compliance_results is defined
      run_once: true
      tags: always

    - name: Build violation summary for alerts
      ansible.builtin.set_fact:
        violation_summary: |
          {% set non_compliant_networks = compliance_results.network_details
             | default([])
             | selectattr('compliant', 'equalto', false)
             | list %}
          {% if non_compliant_networks | length == 0 %}
          - No non-compliant network details were captured.
          {% else %}
          {% for network in non_compliant_networks %}
          - **Network:** `{{ network.network_name }}` (`{{ network.network_id }}`)
          {% set drifted_ssids = network.ssids
             | default([])
             | selectattr('drift_detected', 'equalto', true)
             | list %}
          {% set security_violations = network.security_violations | default([]) %}
          {% if drifted_ssids | length > 0 %}
            - SSID Drift:
          {% for ssid in drifted_ssids %}
              - `{{ ssid.name }}`:
          {% for field, values in ssid.differences.items() %}
                - `{{ field }}`: `{{ values.current }}` -> `{{ values.desired }}`
          {% endfor %}
          {% endfor %}
          {% endif %}
          {% if security_violations | length > 0 %}
            - Security Violations:
          {% for violation in security_violations %}
              - [{{ violation.severity | upper }}] {{ violation.message }}
                (`{{ violation.current_value }}` -> `{{ violation.expected }}`)
          {% endfor %}
          {% endif %}
          {% if (drifted_ssids | length == 0) and (security_violations | length == 0) %}
            - Network is non-compliant, but no per-item details were collected.
          {% endif %}
          {% endfor %}
          {% endif %}
      when:
        - compliance_results is defined
        - compliance_failed | default(false) | bool
      run_once: true
      tags: always

    - name: Create GitHub Issue for compliance violation
      ansible.builtin.uri:
        url: >-
          https://api.github.com/repos/{{ compliance_github_repo }}/issues
        method: POST
        headers:
          Authorization: "Bearer {{ compliance_github_token }}"
          Accept: "application/vnd.github+json"
        body_format: json
        body:
          title: >-
            Wireless Compliance Violation -
            {{ ansible_date_time.date }}
          body: |
            ## Wireless Compliance Violation Detected

            **Date:** {{ ansible_date_time.iso8601 }}
            **Severity:** High

            ### Summary

            | Metric | Count |
            |--------|-------|
            | Networks Checked | {{ compliance_results.networks_checked }} |
            | Networks Non-Compliant | {{ compliance_results.networks_non_compliant }} |
            | SSIDs Non-Compliant | {{ compliance_results.ssids_non_compliant }} |

            ### Non-Compliant Networks and Findings

            {{ violation_summary }}

            ### Remediation

            Run the SSID management playbook to restore compliance:
            ```
            ansible-playbook playbooks/ssid_management.yml -i inventory/production.yml
            ```

            ---
            *Auto-generated by Ansible Compliance Check*
          labels:
            - compliance-violation
            - wireless
            - automated
        status_code: [201]
      delegate_to: localhost
      run_once: true
      no_log: true
      when:
        - compliance_failed | default(false) | bool
        - compliance_github_alert_enabled | default(false) | bool
        - compliance_github_repo | default('') | length > 0
        - compliance_github_token | default('') | length > 0
      tags:
        - alerting
        - github

    - name: Build Webex card violation details
      ansible.builtin.set_fact:
        webex_card_details_text: |
          {% set non_compliant_networks = compliance_results.network_details
             | default([])
             | selectattr('compliant', 'equalto', false)
             | list %}
          {% if non_compliant_networks | length == 0 %}
          No non-compliant network details were captured.
          {% else %}
          {% for network in non_compliant_networks %}
          Network: {{ network.network_name }} ({{ network.network_id }})
          {% set critical_violations = network.security_violations
             | default([])
             | selectattr('severity', 'equalto', 'critical')
             | list %}
          {% if critical_violations | length > 0 %}
          {% for violation in critical_violations %}
          - {{ violation.message }} ({{ violation.current_value }} -> {{ violation.expected }})
          {% endfor %}
          {% else %}
          - No critical SSID violations listed.
          {% endif %}
          {% endfor %}
          {% endif %}
      when:
        - compliance_results is defined
        - compliance_failed | default(false) | bool
      run_once: true
      tags:
        - alerting
        - webex
        - webex-bot

    - name: Build Webex adaptive card payload
      ansible.builtin.set_fact:
        webex_compliance_card:
          "$schema": "http://adaptivecards.io/schemas/adaptive-card.json"
          type: "AdaptiveCard"
          version: "1.0"
          body:
            - type: "TextBlock"
              text: "Wireless Compliance Violation"
              weight: "Bolder"
              size: "Large"
              color: "Attention"
            - type: "TextBlock"
              text: "{{ ansible_date_time.iso8601 }}"
              size: "Small"
              isSubtle: true
            - type: "TextBlock"
              text: >-
                {{ compliance_results.networks_non_compliant | default(0) }} network(s)
                and {{ compliance_results.ssids_non_compliant | default(0) }} SSID(s)
                are non-compliant.
              wrap: true
            - type: "TextBlock"
              text: "Details"
              weight: "Bolder"
              spacing: "Small"
            - type: "TextBlock"
              text: "{{ webex_card_details_text }}"
              wrap: true
              size: "Small"
            - type: "TextBlock"
              text: "Remediation: ansible-playbook playbooks/ssid_management.yml"
              wrap: true
              size: "Small"
      when:
        - compliance_results is defined
        - compliance_failed | default(false) | bool
      run_once: true
      tags:
        - alerting
        - webex
        - webex-bot

    - name: Send Webex Teams notification for compliance violation
      ansible.builtin.uri:
        url: "{{ compliance_webex_webhook_url }}"
        method: POST
        headers:
          Content-Type: "application/json"
        body_format: json
        body:
          markdown: |
            Wireless Compliance Violation detected. See adaptive card for details.
          attachments:
            - contentType: "application/vnd.microsoft.card.adaptive"
              content: "{{ webex_compliance_card }}"
        status_code: 200
        validate_certs: true
      delegate_to: localhost
      run_once: true
      when:
        - compliance_failed | default(false) | bool
        - compliance_webex_alert_enabled | default(false) | bool
        - compliance_webex_webhook_url | default('') | length > 0
      tags:
        - alerting
        - webex

    - name: Send Webex Bot adaptive card for compliance violation
      ansible.builtin.uri:
        url: "https://webexapis.com/v1/messages"
        method: POST
        headers:
          Authorization: "Bearer {{ compliance_webex_bot_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          toPersonEmail: "{{ compliance_webex_alert_email }}"
          markdown: |
            Wireless Compliance Violation detected. See adaptive card for details.
          attachments:
            - contentType: "application/vnd.microsoft.card.adaptive"
              content: "{{ webex_compliance_card }}"
        status_code: 200
        validate_certs: true
      delegate_to: localhost
      run_once: true
      no_log: true
      when:
        - compliance_failed | default(false) | bool
        - compliance_webex_bot_enabled | default(false) | bool
        - compliance_webex_bot_token | default('') | length > 0
        - compliance_webex_alert_email | default('') | length > 0
      tags:
        - alerting
        - webex
        - webex-bot

    - name: Compliance check passed - no alerts needed
      ansible.builtin.debug:
        msg: "All networks are compliant. No alerts triggered."
      when:
        - compliance_results is defined
        - not (compliance_failed | default(false) | bool)
      run_once: true
      tags: always
