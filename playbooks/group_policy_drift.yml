---
# Group Policy Configuration Drift Detection Playbook
# 
# Purpose: Detect and remediate group policy configuration drift
# 
# This playbook implements the "Configuration Drift Audit" pattern:
# 1. Establish a "golden network" baseline (defined in group_vars/all.yml)
# 2. Query current group policies from Meraki Dashboard API
# 3. Compare current state against desired baseline
# 4. Report detected drift with detailed differences
# 5. Conditionally remediate drift (auto-fix unless --check flag used)
#
# Usage:
#   # Report mode (detect drift, no changes)
#   ansible-playbook playbooks/group_policy_drift.yml --check --diff
#
#   # Auto-remediation mode (detect and fix)
#   ansible-playbook playbooks/group_policy_drift.yml
#
#   # Check specific network
#   ansible-playbook playbooks/group_policy_drift.yml --limit sandbox
#
#   # Schedule with cron (daily at 2 AM, check mode only)
#   0 2 * * * cd /path/to/repo && ansible-playbook playbooks/group_policy_drift.yml --check
#
# Prerequisites:
#   - MERAKI_DASHBOARD_API_KEY environment variable or vault_meraki_api_key
#   - group_vars/all.yml with meraki_group_policies defined
#   - inventory file with meraki_servers hosts
#
# Example Scenario:
#   If someone accidentally changes a group policy's bandwidth limit from 10 Mbps to 
#   20 Mbps, running this playbook will detect the drift and (in normal mode) revert 
#   it back to the desired 10 Mbps state due to idempotency.

- name: Group Policy Configuration Drift Detection
  hosts: meraki_servers
  connection: local
  gather_facts: false
  
  vars:
    # Report output directory and filename
    drift_report_dir: "{{ playbook_dir }}/../reports"
    drift_report_file: "group_policy_drift_{{ ansible_date_time.epoch }}.md"
  
  pre_tasks:
    - name: Display playbook mode
      ansible.builtin.debug:
        msg: |
          ╔════════════════════════════════════════════════════════════════╗
          ║  Group Policy Configuration Drift Detection                   ║
          ╚════════════════════════════════════════════════════════════════╝
          
          {% if ansible_check_mode %}
          🔍 MODE: CHECK MODE (Report Only)
          - Will detect drift without making changes
          - Safe to run in production
          - Results saved to report
          {% else %}
          ⚙️  MODE: REMEDIATION MODE (Auto-Fix)
          - Will detect AND correct drift
          - Changes will be applied to Meraki Dashboard
          - Configurations will be reverted to source of truth
          {% endif %}
          
          Network: {{ meraki_network_id | default('Not specified') }}
          Policies to check: {{ meraki_group_policies | default([]) | length }}
    
    - name: Ensure reports directory exists
      ansible.builtin.file:
        path: "{{ drift_report_dir }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true
    
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - meraki_network_id is defined
          - meraki_group_policies is defined
          - meraki_group_policies | length > 0
        fail_msg: |
          Required configuration missing:
          - meraki_network_id: Must specify target network
          - meraki_group_policies: Must define desired group policies in group_vars
        success_msg: "Configuration validated successfully"
  
  roles:
    - role: meraki_group_policy_drift
      vars:
        report_output_path: "{{ drift_report_dir }}/{{ drift_report_file }}"
  
  post_tasks:
    - name: Display drift summary
      ansible.builtin.debug:
        msg: |
          ╔════════════════════════════════════════════════════════════════╗
          ║  Drift Detection Summary                                      ║
          ╚════════════════════════════════════════════════════════════════╝
          
          {% if ansible_check_mode %}
          Mode: CHECK MODE (report only, no remediation)
          {% else %}
          Mode: REMEDIATION MODE (drift auto-corrected)
          {% endif %}
          
          📊 Statistics:
          - Total Policies Checked: {{ drift_results.total_policies | default(0) }}
          - Policies Compliant: {{ drift_results.compliant_policies | default(0) }}
          - Policies With Drift: {{ drift_results.drift_detected | default(0) }}
          
          {% if drift_results.remediation_attempted | default(false) %}
          🔧 Remediation:
          - Successfully Corrected: {{ drift_results.remediation_success | default(0) }}
          {% if drift_results.remediation_failed | default(0) > 0 %}
          - Failed to Correct: {{ drift_results.remediation_failed }}
          {% endif %}
          {% endif %}
          
          📄 Report: {{ drift_report_dir }}/{{ drift_report_file }}
          
          {% if drift_results.drift_detected | default(0) | int > 0 %}
          {% if ansible_check_mode %}
          ⚠️  Drift detected! Run without --check to remediate.
          {% else %}
          ✅ Drift has been remediated.
          {% endif %}
          {% else %}
          ✅ All policies are compliant with source of truth.
          {% endif %}
      run_once: true
      when: drift_results is defined
    
    - name: Compliance status check
      ansible.builtin.assert:
        that:
          - drift_results.drift_detected | default(0) | int == 0 or ansible_check_mode
        fail_msg: |
          Configuration drift detected and remediation failed!
          Review the errors above and retry.
        success_msg: "All group policies are compliant"
      when: 
        - drift_results is defined
        - not ansible_check_mode
      ignore_errors: true  # Don't fail the playbook, just warn
