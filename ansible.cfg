# Ansible Configuration File
# Settings optimized for API-based automation (no SSH required)

[defaults]
jinja2_native = True
inventory = inventory/production.yml
host_key_checking = False
retry_files_enabled = False
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 3600
roles_path = roles
display_skipped_hosts = True
display_ok_hosts = True
deprecation_warnings = False
timeout = 30
# Uncomment to enable detailed logging:
# log_path = ./ansible.log

[inventory]
enable_plugins = yaml, ini, auto

[privilege_escalation]
become = False

[connection]
timeout = 30
connection = local

[colors]
highlight = white
verbose = blue
warn = bright purple
error = red
debug = dark gray
deprecate = purple
skip = cyan
unreachable = red
ok = green
changed = yellow
