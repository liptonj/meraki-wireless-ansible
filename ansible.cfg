# Ansible Configuration File
# See: https://docs.ansible.com/ansible/latest/reference_appendices/config.html
#
# This file configures Ansible behavior for the Meraki Wireless project
# Settings are optimized for API-based automation (no SSH required)

[defaults]
# Inventory file location
# Points to sandbox inventory for development/testing
inventory = inventory/sandbox.yml

# Disable SSH host key checking
# Not needed for Meraki API automation (no SSH connections)
# Set to True in production if using SSH-based modules
host_key_checking = False

# Disable retry file creation
# Retry files can clutter the workspace
retry_files_enabled = False

# Smart fact gathering
# Only gather facts when needed (improves performance)
gathering = smart

# Fact caching configuration
# Cache facts to avoid repeated API calls during development
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 3600

# Roles path
# Where Ansible looks for custom roles
roles_path = roles

# Collections path
# Where Ansible collections are installed (default: ~/.ansible/collections)
# Uncomment to use project-local collections:
# collections_paths = ./collections

# Display skipped tasks
# Set to False to reduce output verbosity
display_skipped_hosts = True

# Display OK tasks
# Set to False to only show changed/failed tasks
display_ok_hosts = True

# Timeout for module execution
# Increase if dealing with slow API responses
timeout = 30

# Logging configuration
# Uncomment to enable detailed logging:
# log_path = ./ansible.log

[inventory]
# Enable inventory plugins
# YAML and INI formats are most common
enable_plugins = yaml, ini, auto

[privilege_escalation]
# No privilege escalation needed for Meraki API
# Meraki API uses API keys, not system credentials
become = False

[connection]
# Connection timeout (seconds)
# Meraki API calls typically complete quickly
timeout = 30

# Connection plugin
# Use 'local' for API-based automation (no SSH)
connection = local

[colors]
# Color output for better readability
highlight = white
verbose = blue
warn = bright purple
error = red
debug = dark gray
deprecate = purple
skip = cyan
unreachable = red
ok = green
changed = yellow
